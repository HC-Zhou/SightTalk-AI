services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml --dev
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      SIGHTTALK_DATA_DIR: /app/data
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-dev-auth-secret-at-least-32-bytes-change-me}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-604800}
      HARNESS_MEMORY_MAX_ITEMS: ${HARNESS_MEMORY_MAX_ITEMS:-20}
      MEMORY_BACKEND: ${MEMORY_BACKEND:-local_markdown}
      MEMORY_AGENT_ID: ${MEMORY_AGENT_ID:-sighttalk}
      MEMORY_SEARCH_LIMIT: ${MEMORY_SEARCH_LIMIT:-5}
      MEMORY_SEARCH_THRESHOLD: ${MEMORY_SEARCH_THRESHOLD:-0.3}
      SHORT_MEMORY_MAX_MESSAGES: ${SHORT_MEMORY_MAX_MESSAGES:-24}
      SHORT_MEMORY_MAX_ESTIMATED_TOKENS: ${SHORT_MEMORY_MAX_ESTIMATED_TOKENS:-8000}
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://localhost:7880}
      LIVEKIT_SERVER_URL: ${LIVEKIT_SERVER_URL:-ws://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-dev-livekit-secret-at-least-32-bytes-change-me}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      BAILIAN_API_KEY: ${BAILIAN_API_KEY:-}
      BAILIAN_REGION: ${BAILIAN_REGION:-cn-beijing}
      BAILIAN_APP_ID: ${BAILIAN_APP_ID:-}
      BAILIAN_APP_API_URL: ${BAILIAN_APP_API_URL:-https://dashscope.aliyuncs.com/api/v1}
      BAILIAN_COMPATIBLE_API_URL: ${BAILIAN_COMPATIBLE_API_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      BAILIAN_TEXT_MODEL: ${BAILIAN_TEXT_MODEL:-qwen-plus}
      BAILIAN_VISION_MODEL: ${BAILIAN_VISION_MODEL:-qwen-vl-plus}
      BAILIAN_WORKSPACE_ID: ${BAILIAN_WORKSPACE_ID:-}
      BAILIAN_MODEL: ${BAILIAN_MODEL:-qwen3.5-omni-plus-realtime}
      BAILIAN_REALTIME_URL: ${BAILIAN_REALTIME_URL:-wss://dashscope.aliyuncs.com/api-ws/v1/realtime}
      BAILIAN_TURN_SILENCE_DURATION_MS: ${BAILIAN_TURN_SILENCE_DURATION_MS:-800}
      AI_MANUAL_RESPONSE_ENABLED: ${AI_MANUAL_RESPONSE_ENABLED:-false}
      DEFAULT_MEDIA_MODE: ${DEFAULT_MEDIA_MODE:-balanced}
      AUDIO_NOISE_SUPPRESSION_ENABLED: ${AUDIO_NOISE_SUPPRESSION_ENABLED:-true}
      ECONOMY_MAX_VIDEO_FPS: ${ECONOMY_MAX_VIDEO_FPS:-0.2}
      BALANCED_MAX_VIDEO_FPS: ${BALANCED_MAX_VIDEO_FPS:-0.5}
      ACCURATE_MAX_VIDEO_FPS: ${ACCURATE_MAX_VIDEO_FPS:-1.0}
      MAX_JPEG_EDGE: ${MAX_JPEG_EDGE:-640}
      JPEG_QUALITY: ${JPEG_QUALITY:-65}
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    depends_on:
      livekit:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend-data:
