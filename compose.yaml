services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml --dev
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://localhost:7880}
      LIVEKIT_SERVER_URL: ${LIVEKIT_SERVER_URL:-ws://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      BAILIAN_API_KEY: ${BAILIAN_API_KEY:-}
      BAILIAN_REGION: ${BAILIAN_REGION:-cn-beijing}
      BAILIAN_APP_ID: ${BAILIAN_APP_ID:-}
      BAILIAN_APP_API_URL: ${BAILIAN_APP_API_URL:-https://dashscope.aliyuncs.com/api/v1}
      BAILIAN_COMPATIBLE_API_URL: ${BAILIAN_COMPATIBLE_API_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      BAILIAN_TEXT_MODEL: ${BAILIAN_TEXT_MODEL:-qwen-plus}
      BAILIAN_VISION_MODEL: ${BAILIAN_VISION_MODEL:-qwen-vl-plus}
      BAILIAN_WORKSPACE_ID: ${BAILIAN_WORKSPACE_ID:-}
      BAILIAN_MODEL: ${BAILIAN_MODEL:-multimodal-dialog}
      BAILIAN_REALTIME_URL: ${BAILIAN_REALTIME_URL:-wss://dashscope.aliyuncs.com/api-ws/v1/inference}
    ports:
      - "8000:8000"
    depends_on:
      - livekit

  agent:
    build:
      context: ./backend
    command: ["uv", "run", "python", "-m", "sighttalk_api.agent.worker"]
    environment:
      APP_ENV: development
      LIVEKIT_URL: ${LIVEKIT_SERVER_URL:-ws://livekit:7880}
      LIVEKIT_SERVER_URL: ${LIVEKIT_SERVER_URL:-ws://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      BAILIAN_API_KEY: ${BAILIAN_API_KEY:-}
      BAILIAN_REGION: ${BAILIAN_REGION:-cn-beijing}
      BAILIAN_APP_ID: ${BAILIAN_APP_ID:-}
      BAILIAN_APP_API_URL: ${BAILIAN_APP_API_URL:-https://dashscope.aliyuncs.com/api/v1}
      BAILIAN_COMPATIBLE_API_URL: ${BAILIAN_COMPATIBLE_API_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      BAILIAN_TEXT_MODEL: ${BAILIAN_TEXT_MODEL:-qwen-plus}
      BAILIAN_VISION_MODEL: ${BAILIAN_VISION_MODEL:-qwen-vl-plus}
      BAILIAN_WORKSPACE_ID: ${BAILIAN_WORKSPACE_ID:-}
      BAILIAN_MODEL: ${BAILIAN_MODEL:-multimodal-dialog}
      BAILIAN_REALTIME_URL: ${BAILIAN_REALTIME_URL:-wss://dashscope.aliyuncs.com/api-ws/v1/inference}
    depends_on:
      - livekit

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend
